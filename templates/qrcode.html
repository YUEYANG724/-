<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>柚子摄影 - 二维码管理</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
  <style>
    .qr-page {
      max-width: 640px;
      margin: 0 auto;
      padding: 24px 18px 40px;
      text-align: center;
    }
    .qr-panel {
      background: #fff;
      border: 1px solid #ece5df;
      border-radius: 8px;
      padding: 20px;
      box-shadow: 0 6px 24px rgba(65, 52, 43, 0.08);
    }
    .qr-box {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 260px;
      margin: 12px 0 18px;
      padding: 18px;
      background: #faf8f6;
      border: 1px solid #eee5dc;
      border-radius: 8px;
    }
    .qr-box img {
      width: min(280px, 78vw);
      height: auto;
    }
    .qr-actions {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 8px;
      margin-top: 12px;
    }
    .qr-url {
      max-width: none;
      text-align: left;
      word-break: break-all;
    }
    .qr-note {
      margin-top: 14px;
      padding: 12px 14px;
      background: #f7f1eb;
      border: 1px solid #eadccd;
      border-radius: 8px;
      color: #6c5a4a;
      font-size: 13px;
      line-height: 1.7;
      text-align: left;
    }
    .qr-error.show { display: block; }
    .qr-error { display: none; }
  </style>
</head>
<body style="{{ header_background_style }}">
  <header class="header">
    <div class="header-content">
      <h1 class="studio-name">柚子摄影</h1>
      <p class="studio-tagline">客户相册固定二维码</p>
    </div>
  </header>

  <main class="qr-page">
    <section class="qr-panel">
      <h2>相册访问二维码</h2>
      <p>客户使用微信扫一扫即可进入相册首页。</p>

      <div class="qr-box">
        <div id="qrLoading">
          <div class="spinner"></div>
          <div style="color:#8a7a6c;font-size:13px;">二维码生成中...</div>
        </div>
        <img id="qrImage" src="" alt="客户相册二维码" style="display:none;">
      </div>

      <input class="qr-url" id="qrUrl" type="text" value="{{ public_url }}" readonly onclick="this.select()">

      <div class="qr-actions">
        <button class="qr-btn" id="refreshBtn">刷新二维码</button>
        <button class="qr-btn secondary" id="downloadBtn">下载二维码</button>
        <a class="qr-btn secondary" href="{{ url_for('admin_page') }}">后台管理</a>
        <a class="qr-btn secondary" href="{{ url_for('index') }}">查看相册</a>
      </div>

      <div class="qr-error" id="qrError"></div>

      <div class="qr-note">
        当前二维码固定指向上方输入框里的公网相册地址。以后客户用微信扫一扫，就会进入这个线上相册。
      </div>
    </section>
  </main>

  <script>
    async function loadQR() {
      const imgEl = document.getElementById('qrImage');
      const urlEl = document.getElementById('qrUrl');
      const errEl = document.getElementById('qrError');
      const loadingEl = document.getElementById('qrLoading');

      loadingEl.style.display = 'block';
      imgEl.style.display = 'none';
      errEl.classList.remove('show');
      errEl.textContent = '';

      try {
        const res = await fetch('/api/qrcode');
        if (!res.ok) throw new Error('HTTP ' + res.status);
        const data = await res.json();
        imgEl.src = data.qr;
        urlEl.value = data.url;
        loadingEl.style.display = 'none';
        imgEl.style.display = 'block';
      } catch (e) {
        loadingEl.style.display = 'none';
        errEl.textContent = '二维码生成失败：' + e.message;
        errEl.classList.add('show');
      }
    }

    function downloadQR() {
      const imgEl = document.getElementById('qrImage');
      if (!imgEl.src) return;
      const link = document.createElement('a');
      link.download = 'youzi-photo-album-qr.png';
      link.href = imgEl.src;
      document.body.appendChild(link);
      link.click();
      document.body.removeChild(link);
    }

    document.getElementById('refreshBtn').addEventListener('click', loadQR);
    document.getElementById('downloadBtn').addEventListener('click', downloadQR);
    window.addEventListener('DOMContentLoaded', loadQR);
  </script>
</body>
</html>
