<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>柚子摄影 - 客户相册</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📷</text></svg>" type="image/svg+xml">
  <link rel="stylesheet" href="/static/css/style.css">
</head>
<body style="">
  <header class="header">
    <div class="header-content">
      <h1 class="studio-name">柚子摄影</h1>
      <p class="studio-tagline">用镜头记录每一个珍贵瞬间</p>
    </div>
  </header>

  <nav class="category-nav" id="categoryNav">
    <button class="category-btn active" data-category="all">全部</button>
    <button class="category-btn" data-category="个人写真">个人写真</button>
    <button class="category-btn" data-category="儿童摄影">儿童摄影</button>
    <button class="category-btn" data-category="全家福">全家福</button>
    <button class="category-btn" data-category="婚纱照">婚纱照</button>
    <button class="category-btn" data-category="旅拍">旅拍</button>
  </nav>

  <main class="gallery" id="gallery">
    <div class="loading"><div class="spinner"></div>加载中...</div>
  </main>

  <!-- Lightbox -->
  <div class="lightbox" id="lightbox">
    <button class="lightbox-close" id="lightboxClose">&times;</button>
    <button class="lightbox-nav lightbox-prev" id="lightboxPrev">&#8249;</button>
    <img class="lightbox-image" id="lightboxImage" src="" alt="">
    <button class="lightbox-nav lightbox-next" id="lightboxNext">&#8250;</button>
    <div class="lightbox-counter" id="lightboxCounter"></div>
  </div>

  <div class="footer">柚子摄影 &copy; 2026</div>

  <script src="/static/js/gallery.js"></script>
</body>
</html>
